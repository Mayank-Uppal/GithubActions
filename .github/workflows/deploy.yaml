# The name that appears in GitHub's "Actions" tab
name: CI — Build & Test

# ─── TRIGGER ──────────────────────────────────────────────────
# "on" defines WHEN this workflow runs.
on:
  push:
    branches:
      - main        # Only triggers when code is pushed to "main".
                    # Pushes to feature branches do NOT trigger this.

# ─── JOBS ─────────────────────────────────────────────────────
# A workflow contains one or more jobs.
# Jobs run in PARALLEL by default (we'll use "needs:" to sequence them).
jobs:

  # ── JOB 1: Test & lint the server ───────────────────────────
  test-server:
    name: Test Server
    runs-on: ubuntu-latest   # Run on GitHub's Ubuntu Linux VM.
                             # "latest" = most recent stable Ubuntu.
                             # This VM has Node, npm, Docker pre-installed.

    steps:
      # Step 1: Check out your code onto the runner.
      # Without this, the runner is an empty Linux machine with no files.
      - name: Checkout code
        uses: actions/checkout@v4
        # "uses" means: run a pre-built Action from the GitHub marketplace.
        # actions/checkout@v4 is maintained by GitHub itself.
        # It runs "git clone" of your repo onto the runner.

      # Step 2: Tell the runner which Node.js version to use.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'        # Use Node 20 LTS.
          cache: 'npm'              # Cache node_modules between runs.
          cache-dependency-path: server/package-lock.json
          # "with" passes configuration options to the Action.
          # "cache: npm" means: if package-lock.json hasn't changed,
          # reuse the cached node_modules instead of re-downloading.

      # Step 3: Install server dependencies.
      - name: Install server dependencies
        run: npm ci               # "run" executes a shell command.
        working-directory: server # Run this command INSIDE the server/ folder.
        # "npm ci" (clean install) is preferred over "npm install" in CI.
        # It installs EXACTLY what's in package-lock.json — no version drift.
        # It also fails if package-lock.json is out of date, catching issues early.

      # Step 4: Run tests (if you have them).
      # If you have no test script yet, this step will be skipped or pass trivially.
      - name: Run server tests
        run: npm test --if-present
        working-directory: server
        # "--if-present" means: only run if a "test" script exists in package.json.
        # This prevents the job from failing on projects with no tests yet.

  # ── JOB 2: Test the client ──────────────────────────────────
  test-client:
    name: Test Client
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Run client tests
        run: npm test --if-present
        working-directory: client

      # Step: Build the Vite app.
      # This catches build errors BEFORE Docker even gets involved.
      # If Vite can't compile your React app, the pipeline fails here — fast.
      - name: Build client (Vite)
        run: npm run build
        working-directory: client

  # ── JOB 3: Build Docker images ──────────────────────────────
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-server, test-client]
    # "needs" creates a dependency: this job only runs AFTER both
    # test-server AND test-client pass successfully.
    # If either test job fails, build-images is skipped entirely.
    # This is the "fail fast" principle — no point building a broken image.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Docker Buildx — the modern Docker build engine.
      # Required for advanced features like layer caching (used in Stage 6).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the server Docker image using server/Dockerfile.
      # "." at the end is the build context — what files Docker can access.
      # "-t" tags the image with a name so we can reference it later.
      - name: Build server Docker image
        run: |
          docker build -t mern-server:latest ./server
        # The "./server" tells Docker: use server/Dockerfile,
        # and the build context is the server/ directory.

      # Build the client Docker image using client/Dockerfile.
      - name: Build client Docker image
        run: |
          docker build -t mern-client:latest ./client