name: CI/CD — Build, Test & Push

on:
  push:
    branches:
      - main

jobs:

  test-server:
    name: Test Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Run server tests
        run: npm test --if-present
        working-directory: server

  test-client:
    name: Test Client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Run client tests
        run: npm test --if-present
        working-directory: client

      - name: Build client (Vite)
        run: npm run build
        working-directory: client
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    needs: [test-server, test-client]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to Docker Hub using your GitHub Secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build AND push backend image to mayankuppal/mern-backend
      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            mayankuppal/mern-backend:latest
            mayankuppal/mern-backend:${{ github.sha }}

      # Build AND push frontend image to mayankuppal/mern-frontend
      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: |
            mayankuppal/mern-frontend:latest
            mayankuppal/mern-frontend:${{ github.sha }}
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}